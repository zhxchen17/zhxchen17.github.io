{{ partial "header.html" . }}
<div class="columns">
    <div class ="column col-5 col-mx-auto" style="background-color: white; border-width: thin; border-style: solid;">
    <section id="content">
        <ul class="posts_listing">
            {{ range .Data.Pages.ByPublishDate.Reverse }}
            <div id="posts">
                <div id=date class="date-time-title">
                    <time>{{ .Date.Format (.Site.Params.dateform | default "Jan 02 2006") }}</time>
                </div>
                <div class="date-time-title post">
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </div>
            </div>
            {{ end }}
        </ul>
    </section>
    </div>
</div>

{{ partial "footer.html" . }}
